<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmTrack — Profile</title>
<link rel="icon" type="image/png" href="/static/brand/farmtrack-mark.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:     #201d1d;
    --card:   #302c2c;
    --card2:  #383333;
    --border: #3d3838;
    --text:   #fdfcfc;
    --text2:  #d4d0d0;
    --muted:  #9a9898;
    --muted2: #6e6e73;
    --blue:   #007aff;
    --green:  #30d158;
    --red:    #ff3b30;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', ui-monospace, 'Menlo', 'Monaco', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 36px 32px;
    width: 420px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .logo {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .logo-mark {
    width: 88px;
    height: 88px;
    border-radius: 4px;
    margin-bottom: 16px;
  }
  .logo h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0;
    line-height: 1;
  }
  .logo h1 span { color: var(--green); }
  .logo .version {
    font-size: 0.65rem;
    color: var(--muted2);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .logo .sub {
    font-size: 0.84rem;
    color: var(--muted);
    margin-top: 10px;
  }

  .section-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted2);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .profiles-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 260px;
    overflow-y: auto;
  }
  .profiles-list::-webkit-scrollbar { width: 4px; }
  .profiles-list::-webkit-scrollbar-track { background: transparent; }
  .profiles-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .profile-row { display: flex; align-items: center; gap: 6px; }

  .profile-btn {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 4px;
    cursor: pointer;
    text-align: left;
    font-size: 0.88rem;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.15s, background 0.15s;
  }
  .profile-btn:hover { border-color: var(--blue); background: rgba(0,122,255,0.06); }
  .profile-btn .icon { font-size: 1rem; }
  .profile-btn .name { flex: 1; font-weight: 500; }
  .profile-btn .open-lbl { font-size: 0.72rem; color: var(--muted); }

  .btn-rename, .btn-delete {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 9px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: inherit;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .btn-rename:hover { border-color: var(--blue); color: var(--blue); }
  .btn-delete:hover { border-color: var(--red); color: var(--red); }

  .empty { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 14px 0; }

  .divider { border: none; border-top: 1px solid var(--border); }

  .new-section { display: flex; flex-direction: column; gap: 10px; }
  .input-row { display: flex; gap: 8px; }

  input[type="text"] {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 0.88rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--blue); }
  input[type="text"]::placeholder { color: var(--muted2); }

  .btn-create {
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn-create:hover { opacity: 0.85; }

  .err { color: var(--red); font-size: 0.78rem; min-height: 1em; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .modal-overlay.hidden { display: none; }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-box {
    background: var(--card2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 28px 28px 24px;
    width: 340px;
    max-width: calc(100vw - 32px);
    display: flex; flex-direction: column; gap: 14px;
    animation: modalIn 0.15s ease;
    text-align: center;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
  }
  .modal-title { font-size: 0.92rem; font-weight: 600; color: var(--text); }
  .modal-msg   { font-size: 0.82rem; color: var(--text2); line-height: 1.55; white-space: pre-wrap; }
  .modal-input {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 4px;
    font-size: 0.88rem;
    font-family: inherit;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--blue); }
  .modal-input.hidden { display: none; }
  .modal-btns { display: flex; gap: 8px; justify-content: center; margin-top: 2px; }
  .modal-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 8px 18px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.84rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .modal-btn:hover { border-color: var(--text2); color: var(--text); }
  .modal-btn-primary {
    background: var(--text);
    color: var(--bg) !important;
    border: none;
    font-weight: 600;
  }
  .modal-btn-primary:hover { opacity: 0.85; }
  .modal-btn-danger { border-color: var(--red); color: var(--red) !important; }
  .modal-btn-danger:hover { background: rgba(255,59,48,0.08); }
</style>
</head>
<body>

<div class="box">
  <div class="logo">
    <img class="logo-mark" src="/static/brand/farmtrack-mark.svg" alt="" aria-hidden="true">
    <h1>Farm<span>Track</span></h1>
    <div class="version">alpha v0.91</div>
    <p class="sub">Select a profile to continue</p>
  </div>

  <div id="existing-section">
    <div class="section-label">Existing profiles</div>
    <div class="profiles-list" id="list">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <hr class="divider">

  <div class="new-section">
    <div class="section-label">Create new profile</div>
    <div class="input-row">
      <input type="text" id="new-name" placeholder="Profile name" maxlength="64">
      <button class="btn-create" onclick="createAndOpen()">Create</button>
    </div>
    <div class="err" id="err"></div>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay hidden" aria-modal="true" role="dialog">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-msg"   id="modal-msg"></div>
    <input type="text" class="modal-input hidden" id="modal-input" autocomplete="off">
    <div class="modal-btns"  id="modal-btns"></div>
  </div>
</div>

<script>
function _modal(title, msg, buttons, withInput, inputDefault) {
  return new Promise(resolve => {
    const overlay = document.getElementById('modal-overlay');
    const titleEl = document.getElementById('modal-title');
    const msgEl   = document.getElementById('modal-msg');
    const inputEl = document.getElementById('modal-input');
    const btnsEl  = document.getElementById('modal-btns');
    titleEl.textContent = title || '';
    msgEl.textContent   = msg   || '';
    if (withInput) {
      inputEl.value = inputDefault != null ? String(inputDefault) : '';
      inputEl.classList.remove('hidden');
    } else {
      inputEl.classList.add('hidden');
    }
    btnsEl.innerHTML = '';
    const close = val => { overlay.classList.add('hidden'); resolve(val); };
    buttons.forEach(({ label, value, cls }) => {
      const btn = document.createElement('button');
      btn.className = 'modal-btn ' + (cls || '');
      btn.textContent = label;
      btn.onclick = () => {
        if (withInput) close(value === null ? null : inputEl.value.trim());
        else            close(value);
      };
      btnsEl.appendChild(btn);
    });
    overlay.classList.remove('hidden');
    if (withInput) {
      setTimeout(() => { inputEl.focus(); inputEl.select(); }, 30);
      inputEl.onkeydown = e => {
        if (e.key === 'Enter')  btnsEl.querySelector('.modal-btn-primary')?.click();
        if (e.key === 'Escape') close(null);
      };
    }
    overlay.onkeydown = e => { if (!withInput && e.key === 'Escape') close(false); };
    overlay.onclick = e => { if (e.target === overlay) close(withInput ? null : false); };
  });
}
function showConfirm(title, msg, danger) {
  return _modal(title, msg, [
    { label: 'Cancel',  value: false, cls: '' },
    { label: 'Confirm', value: true,  cls: danger ? 'modal-btn-danger' : 'modal-btn-primary' }
  ], false);
}
function showAlert(msg, title) {
  return _modal(title || 'Notice', msg, [
    { label: 'OK', value: true, cls: 'modal-btn-primary' }
  ], false);
}
function showPrompt(title, label, defaultVal) {
  return _modal(title, label, [
    { label: 'Cancel', value: null, cls: '' },
    { label: 'OK',     value: true, cls: 'modal-btn-primary' }
  ], true, defaultVal);
}

async function loadProfiles() {
  const res = await fetch('/api/profiles');
  const profiles = await res.json();
  const list = document.getElementById('list');
  if (!profiles.length) {
    list.innerHTML = '<div class="empty">No profiles — create your first one</div>';
    return;
  }
  list.innerHTML = profiles.map(name => `
    <div class="profile-row">
      <button class="profile-btn" onclick="openProfile('${name}')">
        <span class="icon">🗂</span>
        <span class="name">${name}</span>
        <span class="open-lbl">Open →</span>
      </button>
      <button class="btn-rename" title="Rename" onclick="renameProfile('${name}')">✎</button>
      <button class="btn-delete" title="Delete" onclick="deleteProfile('${name}')">✕</button>
    </div>
  `).join('');
}

async function openProfile(name) {
  const res = await fetch('/api/profiles/select', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name})
  });
  if ((await res.json()).ok) location.href = '/';
}

async function renameProfile(oldName) {
  const newName = await showPrompt(`Rename profile`, 'New name:', oldName);
  if (!newName || newName.trim() === oldName) return;
  const res = await fetch('/api/profiles/rename', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({old_name: oldName, new_name: newName.trim()})
  });
  const data = await res.json();
  if (data.ok) loadProfiles();
  else await showAlert(data.error || 'Error');
}

async function deleteProfile(name) {
  if (!await showConfirm('Delete profile', `Delete profile "${name}"?\n\nThis will permanently delete the profile and all its data.`, true)) return;
  const res = await fetch('/api/profiles/delete', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name})
  });
  const data = await res.json();
  if (data.ok) loadProfiles();
  else await showAlert(data.error || 'Error');
}

async function createAndOpen() {
  const name = document.getElementById('new-name').value.trim();
  const err = document.getElementById('err');
  err.textContent = '';
  if (!name) { err.textContent = 'Enter a name'; return; }
  if (/[\/\\\.]{2,}/.test(name)) { err.textContent = 'Invalid characters'; return; }
  const res = await fetch('/api/profiles/select', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name})
  });
  const data = await res.json();
  if (data.ok) location.href = '/';
  else err.textContent = data.error || 'Error';
}

document.getElementById('new-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') createAndOpen();
});

loadProfiles();
</script>
</body>
</html>
