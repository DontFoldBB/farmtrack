name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --onedir --windowed --name FarmTrack --add-data "templates;templates" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FarmTrack-Windows
          path: dist/FarmTrack/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --onedir --windowed --name FarmTrack --add-data "templates:templates" main.py

      - name: Zip app bundle
        run: |
          cd dist
          zip -r FarmTrack-Mac.zip FarmTrack.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FarmTrack-Mac
          path: dist/FarmTrack-Mac.zip
